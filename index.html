<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messeng123 Pro</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.app{
  width:1000px;
  height:650px;
  display:flex;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.sidebar{
  width:260px;
  background:#111827;
  color:white;
  display:flex;
  flex-direction:column;
  padding:15px;
}

.sidebar h2{margin:0 0 10px;text-align:center}

.user{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.online{color:#4ade80;font-size:12px}

.group{
  padding:10px;
  margin:5px 0;
  background:#374151;
  border-radius:10px;
  cursor:pointer;
}
.group:hover{background:#4b5563}

.chat{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:15px;
}

.messages{
  flex:1;
  overflow:auto;
  background:#f3f4f6;
  padding:10px;
  border-radius:10px;
}

.message{
  margin:6px 0;
  padding:10px;
  border-radius:10px;
  background:#e5e7eb;
}

.self{background:#c7d2fe}

.input-area{display:flex;margin-top:10px}
input{flex:1;padding:10px;border-radius:10px;border:1px solid #ccc}
button{margin-left:10px;padding:10px;border:none;border-radius:10px;background:#667eea;color:#fff;cursor:pointer}
button:hover{background:#5a67d8}

.auth{
  background:#fff;
  padding:30px;
  border-radius:15px;
  width:320px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
}

img.avatar{
  width:40px;height:40px;border-radius:50%;vertical-align:middle;margin-right:5px
}
</style>
</head>

<body>

<div class="auth" id="auth">
  <h2>Messeng123</h2>
  <input id="username" placeholder="Benutzername">
  <input id="password" type="password" placeholder="Passwort">
  <input id="avatar" placeholder="Profilbild URL (optional)">
  <button onclick="register()">Registrieren</button>
  <button onclick="login()">Login</button>
</div>

<div class="app" id="app" style="display:none">

<div class="sidebar">
  <div class="user" id="userInfo"></div>

  <h2>Gruppen</h2>
  <div id="groups"></div>
  <input id="newGroup" placeholder="Neue Gruppe">
  <button onclick="addGroup()">+</button>

  <h2>Direktnachrichten</h2>
  <div id="users"></div>
</div>

<div class="chat">
  <h3 id="chatTitle">Chat</h3>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input id="msg" placeholder="Nachricht...">
    <button onclick="send()">Senden</button>
  </div>
</div>

</div>

<script>
let currentUser=null;
let currentChat=null;

function register(){
  const u=username.value;
  const p=password.value;
  const a=avatar.value;
  if(!u||!p) return alert('Ausfüllen');

  let users=JSON.parse(localStorage.getItem('users')||'{}');
  users[u]={pass:p,avatar:a};
  localStorage.setItem('users',JSON.stringify(users));
  alert('Registriert');
}

function login(){
  const u=username.value;
  const p=password.value;
  let users=JSON.parse(localStorage.getItem('users')||'{}');

  if(users[u] && users[u].pass===p){
    currentUser=u;
    localStorage.setItem('online_'+u,true);

    auth.style.display='none';
    app.style.display='flex';

    loadUI();
  } else alert('Falsch');
}

function loadUI(){
  let users=JSON.parse(localStorage.getItem('users')||'{}');
  userInfo.innerHTML=`<b>${currentUser}</b><br><span class='online'>● Online</span>`;

  loadGroups();
  loadUsers();
}

function loadGroups(){
  groups.innerHTML='';
  let g=JSON.parse(localStorage.getItem('groups')||'[]');
  g.forEach(x=>{
    let d=document.createElement('div');
    d.className='group';
    d.innerText=x;
    d.onclick=()=>openChat('group_'+x);
    groups.appendChild(d);
  });
}

function addGroup(){
  let g=newGroup.value;
  if(!g) return;
  let list=JSON.parse(localStorage.getItem('groups')||'[]');
  list.push(g);
  localStorage.setItem('groups',JSON.stringify(list));
  newGroup.value='';
  loadGroups();
}

function loadUsers(){
  usersDiv=document.getElementById('users');
  usersDiv.innerHTML='';

  let users=JSON.parse(localStorage.getItem('users')||'{}');

  Object.keys(users).forEach(u=>{
    if(u===currentUser) return;
    let d=document.createElement('div');
    d.className='group';
    d.innerText=u;
    d.onclick=()=>openChat('dm_'+u);
    usersDiv.appendChild(d);
  });
}

function openChat(id){
  currentChat=id;
  chatTitle.innerText=id;
  loadMessages();
}

function send(){
  if(!currentChat) return alert('Chat wählen');
  let text=msg.value;
  if(!text) return;

  let all=JSON.parse(localStorage.getItem('msgs')||'{}');
  if(!all[currentChat]) all[currentChat]=[];

  all[currentChat].push({u:currentUser,t:text});
  localStorage.setItem('msgs',JSON.stringify(all));

  msg.value='';
  loadMessages();
}

function loadMessages(){
  messages.innerHTML='';
  let all=JSON.parse(localStorage.getItem('msgs')||'{}');
  let arr=all[currentChat]||[];

  arr.forEach(m=>{
    let d=document.createElement('div');
    d.className='message'+(m.u===currentUser?' self':'');
    d.innerHTML=`<b>${m.u}:</b> ${m.t}`;
    messages.appendChild(d);
  });
}
</script>

</body>
</html>
