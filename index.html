<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messeng123</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #333;
}
.auth {
  background: #fff;
  padding: 40px;
  border-radius: 20px;
  width: 350px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}
.auth input {
  width: 100%;
  margin: 12px 0;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 16px;
}
.auth button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #667eea;
  color: #fff;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}
.auth button:hover { background: #5a67d8; }
.app {
  display: flex;
  width: 900px;
  height: 600px;
  background: #fff;
  border-radius: 25px;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}
.sidebar {
  width: 250px;
  background: #1f2937;
  color: white;
  display: flex;
  flex-direction: column;
  padding: 20px;
}
.sidebar h2 { text-align: center; margin-bottom: 15px; }
.group {
  padding: 12px;
  margin-bottom: 8px;
  background: #374151;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}
.group:hover { background: #4b5563; }
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px;
  background: #f3f4f6;
}
.chat h2 { text-align: center; margin-bottom: 10px; }
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  background: #e5e7eb;
  border-radius: 20px;
  margin-bottom: 15px;
}
.message {
  margin: 8px 0;
  padding: 10px 15px;
  background: #d1d5db;
  border-radius: 15px;
  max-width: 70%;
}
.message.self { background: #c7d2fe; align-self: flex-end; }
.input-area { display: flex; }
.input-area input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
  font-size: 16px;
}
.input-area button {
  padding: 12px 20px;
  margin-left: 10px;
  border-radius: 20px;
  border: none;
  background: #667eea;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}
.input-area button:hover { background: #5a67d8; }
</style>
</head>
<body>

<div class="auth" id="auth">
  <h2>Messeng123</h2>
  <input type="text" id="username" placeholder="Benutzername">
  <input type="password" id="password" placeholder="Passwort">
  <button onclick="register()">Registrieren</button>
  <button onclick="login()">Login</button>
</div>

<div class="app" id="app" style="display:none;">
  <div class="sidebar">
    <h2>Gruppen</h2>
    <div id="groupList"></div>
    <input type="text" id="newGroup" placeholder="Neue Gruppe">
    <button onclick="addGroup()">+</button>
  </div>
  <div class="chat">
    <h2 id="currentGroup">Keine Gruppe</h2>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Nachricht schreiben...">
      <button onclick="sendMessage()">Senden</button>
    </div>
  </div>
</div>

<script>
let currentUser = null;
let currentGroup = null;

function register() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  if (!username || !password) return alert('Bitte alles ausfüllen');
  localStorage.setItem(username, password);
  alert('Registriert! Jetzt einloggen.');
}

function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const storedPassword = localStorage.getItem(username);
  if (storedPassword === password) {
    currentUser = username;
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadGroups();
  } else alert('Falsche Daten');
}

function addGroup() {
  const g = document.getElementById('newGroup').value;
  if (!g) return;
  let groups = JSON.parse(localStorage.getItem('groups') || '[]');
  groups.push(g);
  localStorage.setItem('groups', JSON.stringify(groups));
  document.getElementById('newGroup').value = '';
  loadGroups();
}

function loadGroups() {
  const list = document.getElementById('groupList');
  list.innerHTML = '';
  const groups = JSON.parse(localStorage.getItem('groups') || '[]');
  groups.forEach(g => {
    const div = document.createElement('div');
    div.classList.add('group');
    div.innerText = g;
    div.onclick = () => selectGroup(g);
    list.appendChild(div);
  });
}

function selectGroup(g) {
  currentGroup = g;
  document.getElementById('currentGroup').innerText = g;
  loadMessages();
}

function sendMessage() {
  if (!currentGroup) return alert('Gruppe wählen');
  const input = document.getElementById('messageInput');
  const message = input.value;
  if (!message) return;
  const messages = JSON.parse(localStorage.getItem('messages') || '{}');
  if (!messages[currentGroup]) messages[currentGroup] = [];
  messages[currentGroup].push({ user: currentUser, text: message });
  localStorage.setItem('messages', JSON.stringify(messages));
  input.value = '';
  loadMessages();
}

function loadMessages() {
  const messagesDiv = document.getElementById('messages');
  messagesDiv.innerHTML = '';
  const messages = JSON.parse(localStorage.getItem('messages') || '{}')[currentGroup] || [];
  messages.forEach(msg => {
    const div = document.createElement('div');
    div.classList.add('message');
    if(msg.user === currentUser) div.classList.add('self');
    div.innerHTML = `<b>${msg.user}:</b> ${msg.text}`;
    messagesDiv.appendChild(div);
  });
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
</script>

</body>
</html>
